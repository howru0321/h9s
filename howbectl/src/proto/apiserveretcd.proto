syntax = "proto3";

package apiserveretcd;

service ApiserverEtcdService {
  rpc CreatePod(PodRequest) returns (PodResponse);
}

message PodRequest {
  string name = 1;
  repeated containerStatus containerStatuses = 2;
}

message containerStatus {
  string id = 1;
  string name = 2;
  string image = 3;
}

message PodResponse {
  string message = 1;
  string pod_id = 2;
}