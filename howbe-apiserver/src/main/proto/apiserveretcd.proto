syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.grpc";
option java_outer_classname = "ApiserverEtcdProto";

package apiserveretcd;

service ApiserverEtcdService {
  rpc CreatePod(PodRequest) returns (PodResponse);
}

message PodRequest {
  string name = 1;
  repeated ContainerMetadata containers = 2;
}

message ContainerMetadata {
  string name = 1;
  string image = 2;
}

message PodResponse {
  string message = 1;
  string pod_id = 2;
}
